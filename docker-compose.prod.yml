# =====================================================================
# TAU 3346 — PRODUCTION-style stack (docker compose -f docker-compose.prod.yml up --build)
# Same topology as dev but built images (no source mounts, no --reload), restart policies on
# every service, and the Next.js standalone runner. Provide a real .env (DB password, Supabase
# keys, provider keys). The Supabase SERVICE_ROLE key reaches the BACKEND ONLY.
# =====================================================================
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medcollab}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong password in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-medcollab}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  fastapi:
    build:
      context: ./apps/fastapi
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medcollab}
      REDIS_URL: redis://redis:6379/0
      HF_HOME: /hf_cache
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  arq-worker:
    build:
      context: ./apps/fastapi
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medcollab}
      REDIS_URL: redis://redis:6379/0
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["arq", "worker.WorkerSettings"]

  nextjs:
    build:
      context: .
      dockerfile: apps/nextjs/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - fastapi

volumes:
  pgdata:
  redisdata:
  hf_cache:
